id: ibm-clear
name: IBM CLEAR
title: IBM CLEAR
description: IBM CLEAR evaluation framework for error analysis and reporting
runtime:
  k8s:
    image: quay.io/evalhub/community-ibm-clear:latest
    entrypoint:
      - python
      - main.py
    cpu_request: 100m
    memory_request: 128Mi
    cpu_limit: 500m
    memory_limit: 1Gi
  local:
    # command is set to true for test-fvt-server-coverage as it runs in local mode.
    # In actual custom provider configurations, it will be set to the actual command to run.
    command: "true"
benchmarks:
  - id: agentic-evaluation
    name: Agentic Evaluation
    description: Agentic evaluation that identifies error categories from agent traces and quantifies their frequencies
    category: error-analysis
    metrics:
      - total_interactions
      - total_issues
      - interactions_with_issues
      - interactions_no_issues
      - total_agents
      - pct_interactions_with_issues
      - issues_per_interaction
      - average_score
    tags:
      - erroranalysis
      - ibmclear
    primary_score:
      metric: average_score
      lower_is_better: false
    pass_criteria:
      threshold: 0.5
