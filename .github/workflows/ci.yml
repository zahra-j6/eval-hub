name: CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: "go.mod"

    - name: Install dependencies
      run: make install-deps

    - name: Format check
      run: |
        make fmt
        git diff --exit-code -- '*.go' || (echo "Code is not formatted. Run 'make fmt' locally." && exit 1)

    - name: Run linter
      run: make lint

    - name: Run vet
      run: make vet

    - name: Run all tests (unit and integration) with coverage
      run: |
        make clean build test-all-coverage

    - name: Upload coverage reports to Codecov
      continue-on-error: ${{ github.actor == 'dependabot[bot]' }}  # Don't fail CI on Dependabot PRs since they can't access secrets
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        files: ./bin/coverage.out,./bin/coverage-fvt.out,./bin/coverage-init.out
        disable_search: true
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Build and verify the API documentation
      run: |
        npm ci
        make documentation
        git diff --exit-code || (echo "API documentation is not generated. Run 'make documentation' locally." && exit 1)

  security-scan:
    name: Gosec Security Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: "go.mod"

    - name: Run Gosec Security Scanner
      uses: securego/gosec@271492bcd930ef72dfb9d00e5bb9544b3b407fb5 # v2.24.0
      with:
        args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'

    - name: Upload SARIF file to GitHub Security tab
      uses: github/codeql-action/upload-sarif@e949a1676c32f4c215780f7429eb9f00ff18b225 # v2.25.1
      if: always()
      with:
        sarif_file: gosec-results.sarif
        category: "gosec-security-scan"

    - name: Upload Gosec results as artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: gosec-results
        path: gosec-results.sarif

  docker-build-push:
    runs-on: ubuntu-latest
    needs: [quality-checks]
    if: github.event_name == 'push'

    env:
      IMAGE_REGISTRY: quay.io
      IMAGE_REPOSITORY: evalhub/evalhub

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up QEMU
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Log in to Quay.io
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ${{ env.IMAGE_REGISTRY }}
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
      env:
        DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      with:
        images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
        # Branch push: <branch>-<sha>, <branch>, latest
        # Tag push (v1.2.3): 1.2.3, 1.2, latest
        tags: |
          type=raw,value=${{ github.ref_name }}-${{ github.sha }},enable=${{ !startsWith(github.ref, 'refs/tags/') }}
          type=raw,value=${{ github.ref_name }},enable=${{ !startsWith(github.ref, 'refs/tags/') }}
          type=raw,value=latest
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Build and push Docker image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      id: build
      with:
        context: .
        file: Containerfile
        platforms: linux/amd64,linux/arm64
        push: true
        build-args: |
          BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: |
          ${{ steps.meta.outputs.labels }}
          ${{ !startsWith(github.ref, 'refs/tags/') && 'quay.expires-after=12w' || '' }}
        annotations: |
          ${{ steps.meta.outputs.annotations }}
          ${{ !startsWith(github.ref, 'refs/tags/') && 'manifest:quay.expires-after=12w' || '' }}
          ${{ !startsWith(github.ref, 'refs/tags/') && 'index:quay.expires-after=12w' || '' }}

    - name: Dry-run Docker image
      run: |
        IMAGE_REF=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
        docker pull "${IMAGE_REF}"
        docker run --rm "${IMAGE_REF}" /app/eval-hub --local --help
