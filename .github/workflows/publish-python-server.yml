name: Build and Publish eval-hub-server

on:
  push:
    branches:
      - main
    tags: ['*']  # we haven't established a Tag strategy yet
  workflow_dispatch:
    inputs:
      publish-test-pypi:
        description: 'Publish to TestPyPI'
        type: boolean
        default: true
      validate-wheels:
        description: 'Run wheel validation on real runners before publishing'
        type: boolean
        default: true

jobs:
  build-binaries:
    name: Build Go binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            output: bin/eval-hub-linux-amd64
          - goos: linux
            goarch: arm64
            output: bin/eval-hub-linux-arm64
          # macOS
          - goos: darwin
            goarch: amd64
            output: bin/eval-hub-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: bin/eval-hub-darwin-arm64
          # Windows
          - goos: windows
            goarch: amd64
            output: bin/eval-hub-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Build binary
        run: make cross-compile CROSS_GOOS=${{ matrix.goos }} CROSS_GOARCH=${{ matrix.goarch }}

      - name: Upload binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ matrix.output }}
          retention-days: 7

  build-wheels:
    name: Build Python wheels
    needs: build-binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: manylinux
            arch: x86_64
            binary-pattern: "binary-linux-amd64"
            binary-name: eval-hub-linux-amd64
          - platform: manylinux
            arch: aarch64
            binary-pattern: "binary-linux-arm64"
            binary-name: eval-hub-linux-arm64
          - platform: macosx
            arch: x86_64
            binary-pattern: "binary-darwin-amd64"
            binary-name: eval-hub-darwin-amd64
          - platform: macosx
            arch: arm64
            binary-pattern: "binary-darwin-arm64"
            binary-name: eval-hub-darwin-arm64
          - platform: win
            arch: amd64
            binary-pattern: "binary-windows-amd64"
            binary-name: eval-hub-windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.11"

      - name: Install wheel and setuptools
        run: make install-wheel-tools

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: ${{ matrix.binary-pattern }}
          path: python-server/evalhub_server/binaries/
          merge-multiple: true

      - name: List downloaded files
        run: |
          ls -la python-server/evalhub_server/binaries/
        shell: bash

      - name: Set platform tag
        id: platform
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "manylinux" ]; then
            echo "tag=manylinux_2_17_${{ matrix.arch }}" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.platform }}" = "macosx" ]; then
            if [ "${{ matrix.arch }}" = "arm64" ]; then
              echo "tag=macosx_11_0_arm64" >> $GITHUB_OUTPUT
            else
              echo "tag=macosx_10_9_x86_64" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ matrix.platform }}" = "win" ]; then
            echo "tag=win_amd64" >> $GITHUB_OUTPUT
          fi

      - name: Build wheel
        run: |
          DEV_SUFFIX_ARG=""
          if [[ ! "${{ github.ref }}" == refs/tags/* ]]; then
            DEV_SUFFIX_ARG="DEV_SUFFIX=dev${{ github.run_number }}"
          fi
          make build-wheel WHEEL_PLATFORM=${{ steps.platform.outputs.tag }} WHEEL_BINARY=${{ matrix.binary-name }} $DEV_SUFFIX_ARG

      - name: Smoke test with python-server tests
        if: matrix.platform == 'manylinux' && matrix.arch == 'x86_64'
        continue-on-error: true
        run: make test-python-server || echo "::warning::python-server smoke tests failed — wheel will still be published"

      - name: Upload wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheel-${{ matrix.platform }}-${{ matrix.arch }}
          path: python-server/dist/*.whl
          retention-days: 7

  validate-wheels:
    name: Validate wheel (${{ matrix.os }})
    needs: build-wheels
    if: inputs.validate-wheels || inputs.validate-wheels == null
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            wheel-artifact: wheel-manylinux-x86_64
          - os: ubuntu-24.04-arm
            wheel-artifact: wheel-manylinux-aarch64
          # Commenting out x86_64 macos as it is hard to come by a runner in GHA
          # - os: macos-13
          #   wheel-artifact: wheel-macosx-x86_64
          - os: macos-latest
            wheel-artifact: wheel-macosx-arm64
          - os: windows-latest
            wheel-artifact: wheel-win-amd64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout VERSION file
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: VERSION

      - name: Set up uv python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.11"

      - name: Download wheel
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ matrix.wheel-artifact }}
          path: dist/

      - name: Create venv and install wheel
        shell: bash
        run: |
          uv venv .venv
          uv pip install --python .venv dist/*.whl

      - name: Validate --version
        shell: bash
        run: |
          if [ -f .venv/bin/eval-hub-server ]; then
            EVAL_HUB=.venv/bin/eval-hub-server
          else
            EVAL_HUB=.venv/Scripts/eval-hub-server
          fi
          EXPECTED=$(tr -d '\r\n' < VERSION)
          ACTUAL=$($EVAL_HUB --version | tr -d '\r')
          echo "Expected: eval-hub-server ${EXPECTED}"
          echo "Actual:   ${ACTUAL}"
          echo "${ACTUAL}" | grep -qF "${EXPECTED}"

  publish:
    name: Publish to PyPI
    needs: [build-wheels, validate-wheels]
    # Publish clean versions to PyPI only on actual tag pushes.
    # The event_name check prevents workflow_dispatch targeting a tag ref from triggering this.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/eval-hub-server
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1

  publish-test-pypi:
    name: Publish to TestPyPI
    needs: [build-wheels, validate-wheels]
    # TestPyPI only receives devX versions. Tag refs are excluded so that
    # workflow_dispatch against a tag cannot publish a clean release version here.
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/') && inputs.publish-test-pypi)
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/eval-hub-server
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
